<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EcoPrompt — History</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>

  <div class="page">

    <header class="page-header">
      <div class="page-branding">
        <img src="../assets/icon-48.png" class="page-logo" alt="EcoPrompt" />
        <h1>📈 Energy Consumption History</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">🌙</button>
        <button id="clear-btn" class="danger-btn">Clear History</button>
      </div>
    </header>

    <!-- Summary stats -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Current</div>
        <div class="stat-value" id="stat-current">—</div>
        <div class="stat-unit">W</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average</div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-unit">W</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Peak</div>
        <div class="stat-value" id="stat-peak">—</div>
        <div class="stat-unit">W</div>
      </div>
    </section>

    <!-- Line chart -->
    <section class="chart-section">
      <div class="chart-header">
        <span class="chart-range">Last 24 Hours</span>
        <button id="refresh-btn" class="refresh-btn">Refresh</button>
      </div>
      <canvas id="chart" width="640" height="240"></canvas>
      <div id="empty-msg" class="empty-msg hidden">No data yet. Open some pages.</div>
    </section>

  </div>

  <script src="options.js"></script>
</body>
</html>
